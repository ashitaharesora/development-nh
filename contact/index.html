<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料相談 | ashitaHARESORA′</title>
  <meta name="description" content="無料相談フォーム">
  <link rel="icon" href="../assets/img/Logo_1.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/img/Logo_1.svg">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/contact-form-google.css">
  <script defer src="../assets/js/main.js"></script>
</head>
<body class="home-page static-header-home">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="../" aria-label="高野晶弘税理士事務所 はれそら社労士事務所 トップページ">
        <img class="brand-logo" src="../assets/img/Logo_1.svg" alt="ashitaHARESORA′ ロゴ">
        <span class="brand-text">
          <span class="brand-kicker">元国税職員・税理士・社労士</span>
          <span class="brand-name">
            <span class="brand-name-tax">高野晶弘税理士事務所</span>
            <span class="brand-name-labor">はれそら社労士事務所</span>
          </span>
        </span>
      </a>
      <nav class="nav site-nav-static" id="site-nav">
        <div class="nav-list">
          <a class="nav-item" href="../">ホーム</a>
          <a class="nav-item" href="../services/">サービス・料金</a>
          <a class="nav-item" href="../about/">事務所案内</a>
          <a class="nav-item" href="../faq/">FAQ</a>
          <div class="nav-cta-group">
            <a class="nav-item cta cta-free" href="../contact/">無料相談</a>
            <a class="nav-item cta cta-phone" href="tel:XXX-XXX-XXXX">TEL XXX-XXX-XXXX</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="breadcrumbs"><a href="../">ホーム</a> / <span>無料相談</span></p>
        <h1>無料相談フォーム</h1>
        <p class="meta">必要事項をご記入のうえ送信してください。</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="form-wrap card">
          <div class="form-intro">
            <h2>今の状況を整理するところから</h2>
            <p>売上、経理、資金、法人化など、今気になっていることをお送りください。</p>
          </div>

          <form class="c-form" id="contact-form">

            <div class="c-form__item">
              <label class="c-form__label" for="field-mail">メールアドレス<span class="c-form__required">必須</span></label>
              <input
                class="c-form__input"
                id="field-mail"
                name="email"
                type="email"
                placeholder="sample@example.com"
                required
              />
            </div>

            <div class="c-form__item">
              <label class="c-form__label" for="field-name">お名前<span class="c-form__required">必須</span></label>
              <input
                class="c-form__input"
                id="field-name"
                name="name"
                type="text"
                placeholder="山田 太郎"
                required
              />
            </div>

            <div class="c-form__item">
              <label class="c-form__label">ご職業<span class="c-form__required">必須</span></label>
              <div class="c-form__choice-group">
                <label class="c-form__choice"><input type="radio" name="job" value="個人事業主" required>個人事業主</label>
                <label class="c-form__choice"><input type="radio" name="job" value="会社役員">会社役員</label>
                <label class="c-form__choice"><input type="radio" name="job" value="会社員・公務員">会社員・公務員</label>
                <label class="c-form__choice"><input type="radio" name="job" value="その他">その他</label>
              </div>
            </div>

            <div class="c-form__item">
              <span class="c-form__label">お問い合わせの種類<span class="c-form__required">必須</span></span>
              <div class="c-form__choice-group">
                <label class="c-form__choice"><input type="checkbox" name="inquiry" value="スタートアップ支援に関すること">スタートアップ支援に関すること</label>
                <label class="c-form__choice"><input type="checkbox" name="inquiry" value="クラウド導入支援に関すること">クラウド導入支援に関すること</label>
                <label class="c-form__choice"><input type="checkbox" name="inquiry" value="補助金・助成金申請支援に関すること">補助金・助成金申請支援に関すること</label>
                <label class="c-form__choice"><input type="checkbox" name="inquiry" value="相続計画・相続対策に関すること">相続計画・相続対策に関すること</label>
                <label class="c-form__choice"><input type="checkbox" name="inquiry" value="プライベート税理士契約に関すること">プライベート税理士契約に関すること</label>
              </div>
            </div>

            <div class="c-form__item">
              <label class="c-form__label" for="field-detail">ご相談の具体的内容<span class="c-form__required">必須</span></label>
              <textarea
                class="c-form__input c-form__textarea"
                id="field-detail"
                name="detail"
                placeholder="ご相談内容をご記入ください"
                required
              ></textarea>
            </div>

            <div class="c-form__item">
              <label class="c-form__label" for="field-other">その他のご希望等</label>
              <textarea
                class="c-form__input c-form__textarea c-form__textarea-small"
                id="field-other"
                name="other"
                placeholder="連絡希望時間帯などがあればご記入ください"
              ></textarea>
            </div>

            <p class="c-form__error" id="form-error" style="display:none; color:#c0392b; margin-top:12px;">
              送信に失敗しました。お手数ですが、お電話またはしばらく経ってから再度お試しください。
            </p>

            <div class="c-form__submit">
              <button type="submit">送信する</button>
            </div>
          </form>

          <script>
            var GAS_URL = 'https://script.google.com/macros/s/AKfycbxxPf2GDxNDQo7ZDpLaZYGAONjdaIFtubyU6YmTlPxvZ95I9IpxXlLw-emQal2xmg3L/exec';

            document.getElementById('contact-form').addEventListener('submit', function(e) {
              e.preventDefault();
              var form = this;
              var btn = form.querySelector('button[type="submit"]');
              var errorMsg = document.getElementById('form-error');
              var fd = new FormData(form);

              // フォームデータをJSONオブジェクトに変換
              var data = {
                email:   fd.get('email')  || '',
                name:    fd.get('name')   || '',
                job:     fd.get('job')    || '',
                inquiry: fd.getAll('inquiry').join('、'), // 複数選択をカンマ区切り
                detail:  fd.get('detail') || '',
                other:   fd.get('other')  || ''
              };

              // 空のフィールドは送信しない
              Object.keys(data).forEach(function(key) {
                if (data[key] === '') delete data[key];
              });

              // お問い合わせ種類が未選択の場合は送信しない
              if (!data.inquiry) {
                alert('お問い合わせの種類を1つ以上選択してください。');
                return;
              }

              btn.disabled = true;
              btn.textContent = '送信中...';
              errorMsg.style.display = 'none';

              // GASへJSON送信（no-corsで302リダイレクト問題を回避）
              fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(data)
              })
              .then(function() {
                // no-corsではレスポンス内容を読めないが送信は完了しているため遷移
                window.location = './thanks.html';
              })
              .catch(function() {
                btn.disabled = false;
                btn.textContent = '送信する';
                errorMsg.style.display = 'block';
              });
            });
          </script>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="../contact/">お問い合わせ</a>
        <a href="../privacy/">プライバシーポリシー</a>
        <a href="../access/">アクセス</a>
      </div>
      <div>© <span data-year></span> ashitaHARESORA′</div>
    </div>
  </footer>
</body>
</html>
