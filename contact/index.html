<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料相談 | ashitaHARESORA′</title>
  <meta name="description" content="無料相談フォーム">
  <link rel="icon" href="assets/img/Logo_1.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/img/Logo_1.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/contact-form-google.css">  
  <script defer src="assets/js/main.js"></script>
</head>
<body class="home-page static-header-home">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="./" aria-label="高野晶弘税理士事務所 はれそら社労士事務所 トップページ">
        <img class="brand-logo" src="assets/img/Logo_1.svg" alt="ashitaHARESORA′ ロゴ">
        <span class="brand-text">
          <span class="brand-kicker">元国税職員・税理士・社労士</span>
          <span class="brand-name">高野晶弘税理士事務所 はれそら社労士事務所</span>
        </span>
      </a>
      <nav class="nav site-nav-static" id="site-nav">
        <div class="nav-list">
          <a class="nav-item" href="./">ホーム</a>
          <a class="nav-item" href="./services/">サービス・料金</a>
          <a class="nav-item" href="./about/">事務所案内</a>
          <a class="nav-item" href="./faq/">FAQ</a>
          <div class="nav-cta-group">
            <a class="nav-item cta cta-free" href="./contact.html">無料相談</a>
            <a class="nav-item cta cta-phone" href="tel:XXX-XXX-XXXX">TEL XXX-XXX-XXXX</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="breadcrumbs"><a href="./">ホーム</a> / <span>無料相談</span></p>
        <h1>無料相談フォーム</h1>
        <p class="meta">必要事項をご記入のうえ送信してください。</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="form-wrap card">
          <div class="form-intro">
            <h2>今の状況を整理するところから</h2>
            <p>売上、経理、資金、法人化など、今気になっていることをお送りください。</p>
          </div>

          <form
            class="c-form"
            action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfVRJAhcmWNw9usFn9-19uO_OUwtYYvd1p2VY_w2omvUFCtPA/formResponse"
            method="POST"
            target="hidden_iframe"
            onsubmit="submitted=true;"
          >
            <div class="c-form__item">
              <label class="c-form__label" for="field-mail">メールアドレス<span class="c-form__required">必須</span></label>
              <input
                class="c-form__input"
                id="field-mail"
                name="entry.495569430"
                type="email"
                placeholder="sample@example.com"
                required
              />
            </div>

            <div class="c-form__item">
              <label class="c-form__label" for="field-name">お名前<span class="c-form__required">必須</span></label>
              <input
                class="c-form__input"
                id="field-name"
                name="entry.2034928511"
                type="text"
                placeholder="山田 太郎"
                required
              />
            </div>

            <div class="c-form__item">
              <label class="c-form__label" for="field-job">ご職業</label>
              <input
                class="c-form__input"
                id="field-job"
                name="entry.303009770"
                type="text"
                placeholder="個人事業主 / 法人代表 / 会社員 など"
              />
            </div>

            <div class="c-form__item">
              <span class="c-form__label">お問い合わせの種類</span>
              <div class="c-form__choice-group">
                <label class="c-form__choice"><input type="radio" name="entry.333722396" value="税務相談">税務相談</label>
                <label class="c-form__choice"><input type="radio" name="entry.333722396" value="労務相談">労務相談</label>
                <label class="c-form__choice"><input type="radio" name="entry.333722396" value="創業・法人化">創業・法人化</label>
                <label class="c-form__choice"><input type="radio" name="entry.333722396" value="補助金・助成金">補助金・助成金</label>
                <label class="c-form__choice"><input type="radio" name="entry.333722396" value="その他">その他</label>
              </div>
            </div>

            <div class="c-form__item">
              <label class="c-form__label" for="field-detail">ご相談の具体的内容</label>
              <textarea
                class="c-form__input c-form__textarea"
                id="field-detail"
                name="entry.346431719"
                placeholder="ご相談内容をご記入ください"
              ></textarea>
            </div>

            <div class="c-form__item">
              <label class="c-form__label" for="field-other">その他のご希望等</label>
              <textarea
                class="c-form__input c-form__textarea c-form__textarea-small"
                id="field-other"
                name="entry.2058381089"
                placeholder="連絡希望時間帯などがあればご記入ください"
              ></textarea>
            </div>

            <div class="c-form__submit">
              <button type="submit">送信する</button>
            </div>
          </form>

          <script>
            let submitted = false;
          </script>
          <iframe
            name="hidden_iframe"
            id="hidden_iframe"
            style="display:none"
            onload="if(submitted){window.location='./thanks.html';}"
          ></iframe>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="./contact.html">お問い合わせ</a>
        <a href="./privacy/">プライバシーポリシー</a>
        <a href="./access/">アクセス</a>
      </div>
      <div>© <span data-year></span> ashitaHARESORA′</div>
    </div>
  </footer>
</body>
</html>
