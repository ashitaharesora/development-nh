name: Build and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Fetch data from microCMS
        run: |
          mkdir -p assets/data

          curl --fail-with-body --silent --show-error \
            "https://${{ vars.MICROCMS_SERVICE_ID }}.microcms.io/api/v1/${{ vars.MICROCMS_ENDPOINT_BLOGS }}?limit=100" \
            -H "X-MICROCMS-API-KEY: ${{ secrets.MICROCMS_API_KEY }}" \
            -o assets/data/blog.json

          curl --fail-with-body --silent --show-error \
            "https://${{ vars.MICROCMS_SERVICE_ID }}.microcms.io/api/v1/${{ vars.MICROCMS_ENDPOINT_CATEGORIES }}?limit=100" \
            -H "X-MICROCMS-API-KEY: ${{ secrets.MICROCMS_API_KEY }}" \
            -o assets/data/category.json

          curl --fail-with-body --silent --show-error \
            "https://${{ vars.MICROCMS_SERVICE_ID }}.microcms.io/api/v1/${{ vars.MICROCMS_ENDPOINT_NEWS }}?limit=100" \
            -H "X-MICROCMS-API-KEY: ${{ secrets.MICROCMS_API_KEY }}" \
            -o assets/data/news.json

      - name: Check output
        run: |
          ls -la assets/data
          head -c 300 assets/data/blog.json || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
